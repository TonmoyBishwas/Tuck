# Best-effort release automation: on a version tag push, build the DMG and
# attach it to the GitHub release. Building requires an Xcode 26 (macOS 26 SDK)
# runner image; if the pinned image is unavailable, release from a local
# machine with scripts/build-app.sh && scripts/build-dmg.sh instead.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i xcode || true
          sudo xcode-select -s /Applications/Xcode_26*.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: Build app
        run: ./scripts/build-app.sh release
      - name: Build DMG
        run: ./scripts/build-dmg.sh
      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" dist/*.dmg --clobber || \
          gh release create "$GITHUB_REF_NAME" dist/*.dmg --title "Tuck $GITHUB_REF_NAME" --generate-notes
